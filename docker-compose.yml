version: '3.8'

services:
  # API Service
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: devopssrepractice-api
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - FRONTEND_URL=http://localhost:3000
      # Uncomment and configure for email
      # - SMTP_USER=${SMTP_USER}
      # - SMTP_PASS=${SMTP_PASS}
      # Contentful config (add later)
      # - CONTENTFUL_SPACE_ID=${CONTENTFUL_SPACE_ID}
      # - CONTENTFUL_ACCESS_TOKEN=${CONTENTFUL_ACCESS_TOKEN}
    restart: unless-stopped
    networks:
      - devopssrepractice-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Web Frontend Service
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: devopssrepractice-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://api:5000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - devopssrepractice-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  devopssrepractice-network:
    driver: bridge
