---
# API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: devopssrepractice
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: devopssrepractice
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
        app.kubernetes.io/name: api
    spec:
      containers:
        - name: api
          image: ghcr.io/OWNER/devopssrepractice-api:latest   # Replace OWNER
          ports:
            - containerPort: 5000
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: API_PORT
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: FRONTEND_URL
            - name: DATABASE_URL
              value: "postgresql://$(PG_USER):$(PG_PASSWORD)@postgres:5432/$(PG_DATABASE)"
            - name: PG_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: PG_USER
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: PG_PASSWORD
            - name: PG_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: PG_DATABASE
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_SECRET
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
---
# API Service
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: devopssrepractice
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: devopssrepractice
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - port: 5000
      targetPort: 5000
---
# API HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-hpa
  namespace: devopssrepractice
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: devopssrepractice
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
