apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: devopssrepractice
  labels:
    app.kubernetes.io/part-of: devopssrepractice
type: Opaque
stringData:
  # IMPORTANT: Replace these values before deploying to production!
  JWT_SECRET: "CHANGE-ME-use-openssl-rand-base64-32"
  PG_PASSWORD: "CHANGE-ME-strong-password"
  PG_USER: "postgres"
  # Optional — Contentful
  # CONTENTFUL_SPACE_ID: ""
  # CONTENTFUL_ACCESS_TOKEN: ""
  # Optional — SMTP
  # SMTP_USER: ""
  # SMTP_PASS: ""
